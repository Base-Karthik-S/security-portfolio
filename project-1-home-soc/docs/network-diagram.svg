<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.6" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/>
    </marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Home SOC Lab · Network Diagram</text>
  <text x="450" y="50" text-anchor="middle" font-size="11.5" fill="#64748b">VMnet8 NAT · 192.168.64.0/24 · gateway .2 · Elastic Stack 9.4.3</text>

  <!-- Host boundary -->
  <rect x="28" y="70" width="844" height="500" rx="14" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="44" y="92" font-size="11.5" font-weight="600" fill="#64748b">Physical host · Windows 11 Home · VMware Workstation Pro</text>

  <!-- ===== Analyst browser ===== -->
  <rect x="350" y="104" width="200" height="52" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="450" y="127" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">Analyst browser</text>
  <text x="450" y="144" text-anchor="middle" font-size="10.5" fill="#64748b">views the Kibana UI</text>

  <!-- ===== DC01 ===== -->
  <rect x="70" y="150" width="250" height="156" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <path d="M70,160 a10,10 0 0 1 10,-10 h230 a10,10 0 0 1 10,10 v24 h-250 z" fill="#2563eb"/>
  <text x="82" y="176" font-size="12.5" font-weight="700" fill="#ffffff">DC01 · Windows Server 2025</text>
  <text x="86" y="204" font-size="12.5" font-weight="700" fill="#1e293b">192.168.64.10</text>
  <text x="86" y="221" font-size="10.5" fill="#64748b">lab.local Domain Controller</text>
  <!-- role pills -->
  <rect x="86" y="232" width="56" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="114" y="246.5" text-anchor="middle" font-size="10" fill="#1d4ed8">AD DS</text>
  <rect x="148" y="232" width="62" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="179" y="246.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Sysmon</text>
  <rect x="86" y="259" width="104" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="138" y="273.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Elastic Agent</text>
  <text x="86" y="298" font-size="10" font-weight="600" fill="#16a34a">&#10003; Agent Healthy in Fleet</text>

  <!-- ===== CLIENT01 ===== -->
  <rect x="70" y="336" width="250" height="156" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <path d="M70,346 a10,10 0 0 1 10,-10 h230 a10,10 0 0 1 10,10 v24 h-250 z" fill="#2563eb"/>
  <text x="82" y="362" font-size="12.5" font-weight="700" fill="#ffffff">CLIENT01 · Windows 11 Enterprise</text>
  <text x="86" y="390" font-size="12.5" font-weight="700" fill="#1e293b">192.168.64.30</text>
  <text x="86" y="407" font-size="10.5" fill="#64748b">lab.local domain-joined client</text>
  <!-- role pills -->
  <rect x="86" y="418" width="62" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="117" y="432.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Sysmon</text>
  <rect x="154" y="418" width="104" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="206" y="432.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Elastic Agent</text>
  <rect x="86" y="445" width="98" height="21" rx="10.5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="135" y="459.5" text-anchor="middle" font-size="10" fill="#b45309">attack target</text>
  <text x="192" y="459.5" font-size="10" font-weight="600" fill="#16a34a">&#10003; Healthy</text>

  <!-- ===== ELK01 ===== -->
  <rect x="540" y="196" width="310" height="284" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <path d="M540,206 a10,10 0 0 1 10,-10 h290 a10,10 0 0 1 10,10 v24 h-310 z" fill="#ea580c"/>
  <text x="554" y="222" font-size="12.5" font-weight="700" fill="#ffffff">ELK01 · Ubuntu Server 24.04 LTS</text>
  <text x="556" y="246" font-size="10.5" fill="#64748b">192.168.64.20  ·  Docker Engine (in guest)</text>

  <!-- Kibana chip -->
  <rect x="556" y="256" width="278" height="52" rx="8" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="572" y="280" font-size="12.5" font-weight="700" fill="#9d174d">Kibana</text>
  <text x="572" y="297" font-size="10" fill="#be185d">SIEM UI · dashboards</text>
  <rect x="760" y="271" width="62" height="22" rx="11" fill="#db2777"/>
  <text x="791" y="286" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:5601</text>

  <!-- Elasticsearch chip -->
  <rect x="556" y="318" width="278" height="52" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.2"/>
  <text x="572" y="342" font-size="12.5" font-weight="700" fill="#115e59">Elasticsearch</text>
  <text x="572" y="359" font-size="10" fill="#0f766e">search + storage</text>
  <rect x="760" y="333" width="62" height="22" rx="11" fill="#0d9488"/>
  <text x="791" y="348" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:9200</text>

  <!-- Fleet chip -->
  <rect x="556" y="380" width="278" height="52" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <text x="572" y="404" font-size="12.5" font-weight="700" fill="#3730a3">Fleet Server</text>
  <text x="572" y="421" font-size="10" fill="#4338ca">agent management</text>
  <rect x="760" y="395" width="62" height="22" rx="11" fill="#4f46e5"/>
  <text x="791" y="410" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:8220</text>

  <!-- ===== Connections ===== -->
  <!-- Browser -> Kibana -->
  <line x1="450" y1="156" x2="562" y2="262" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="486" y="212" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2563eb">5601 · HTTP</text>

  <!-- DC01 -> Elasticsearch (data) -->
  <line x1="320" y1="238" x2="552" y2="340" stroke="#0d9488" stroke-width="2" marker-end="url(#aTeal)"/>
  <!-- DC01 -> Fleet (control) -->
  <line x1="320" y1="278" x2="552" y2="400" stroke="#4f46e5" stroke-width="2" marker-end="url(#aIndigo)"/>

  <!-- CLIENT01 -> Elasticsearch (data) -->
  <line x1="320" y1="404" x2="552" y2="348" stroke="#0d9488" stroke-width="2" marker-end="url(#aTeal)"/>
  <!-- CLIENT01 -> Fleet (control) -->
  <line x1="320" y1="452" x2="552" y2="408" stroke="#4f46e5" stroke-width="2" marker-end="url(#aIndigo)"/>

  <!-- plane labels -->
  <text x="430" y="300" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">9200 · TLS (data)</text>
  <text x="424" y="360" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4f46e5">8220 · TLS (control)</text>

  <!-- ===== Legend ===== -->
  <line x1="40" y1="586" x2="66" y2="586" stroke="#0d9488" stroke-width="2.5"/>
  <text x="72" y="590" font-size="10.5" fill="#475569">Data plane · :9200 TLS</text>
  <line x1="230" y1="586" x2="256" y2="586" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="262" y="590" font-size="10.5" fill="#475569">Control plane · :8220 TLS</text>
  <line x1="440" y1="586" x2="466" y2="586" stroke="#2563eb" stroke-width="2.5"/>
  <text x="472" y="590" font-size="10.5" fill="#475569">UI · :5601 HTTP</text>
  <line x1="610" y1="586" x2="636" y2="586" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="642" y="590" font-size="10.5" fill="#475569">host boundary</text>
</svg>
