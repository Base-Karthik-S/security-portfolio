<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.6" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/>
    </marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Home SOC Lab — Network Diagram</text>
  <text x="440" y="50" text-anchor="middle" font-size="11.5" fill="#64748b">VMnet8 NAT · 192.168.64.0/24 · gateway .2 · Elastic Stack 9.4.3</text>

  <!-- Host boundary -->
  <rect x="28" y="70" width="824" height="446" rx="14" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="44" y="92" font-size="11.5" font-weight="600" fill="#64748b">Physical host — Windows 11 Home · VMware Workstation Pro</text>

  <!-- ===== Analyst browser ===== -->
  <rect x="360" y="110" width="200" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="460" y="134" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">Analyst browser</text>
  <text x="460" y="152" text-anchor="middle" font-size="10.5" fill="#64748b">views the Kibana UI</text>

  <!-- ===== DC01 ===== -->
  <rect x="70" y="250" width="240" height="192" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <path d="M70,260 a10,10 0 0 1 10,-10 h220 a10,10 0 0 1 10,10 v24 h-240 z" fill="#2563eb"/>
  <text x="82" y="272" font-size="12.5" font-weight="700" fill="#ffffff">DC01 · Windows Server 2025</text>
  <text x="86" y="308" font-size="12.5" font-weight="700" fill="#1e293b">192.168.64.10</text>
  <text x="86" y="326" font-size="10.5" fill="#64748b">lab.local Domain Controller</text>
  <!-- role pills -->
  <rect x="86" y="342" width="58" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="115" y="356.5" text-anchor="middle" font-size="10" fill="#1d4ed8">AD DS</text>
  <rect x="150" y="342" width="66" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="183" y="356.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Sysmon</text>
  <rect x="86" y="371" width="104" height="21" rx="10.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="138" y="385.5" text-anchor="middle" font-size="10" fill="#1d4ed8">Elastic Agent</text>
  <text x="86" y="414" font-size="10" font-weight="600" fill="#16a34a">&#10003; Agent Healthy in Fleet</text>

  <!-- ===== ELK01 ===== -->
  <rect x="520" y="176" width="300" height="262" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" filter="url(#shadow)"/>
  <path d="M520,186 a10,10 0 0 1 10,-10 h280 a10,10 0 0 1 10,10 v24 h-300 z" fill="#ea580c"/>
  <text x="534" y="198" font-size="12.5" font-weight="700" fill="#ffffff">ELK01 · Ubuntu Server 24.04 LTS</text>
  <text x="536" y="230" font-size="10.5" fill="#64748b">192.168.64.20  ·  Docker Engine (in guest)</text>

  <!-- Kibana chip -->
  <rect x="536" y="242" width="268" height="52" rx="8" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="552" y="266" font-size="12.5" font-weight="700" fill="#9d174d">Kibana</text>
  <text x="552" y="283" font-size="10" fill="#be185d">SIEM UI · dashboards</text>
  <rect x="726" y="257" width="62" height="22" rx="11" fill="#db2777"/>
  <text x="757" y="272" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:5601</text>

  <!-- Elasticsearch chip -->
  <rect x="536" y="304" width="268" height="52" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.2"/>
  <text x="552" y="328" font-size="12.5" font-weight="700" fill="#115e59">Elasticsearch</text>
  <text x="552" y="345" font-size="10" fill="#0f766e">search + storage</text>
  <rect x="726" y="319" width="62" height="22" rx="11" fill="#0d9488"/>
  <text x="757" y="334" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:9200</text>

  <!-- Fleet chip -->
  <rect x="536" y="366" width="268" height="52" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <text x="552" y="390" font-size="12.5" font-weight="700" fill="#3730a3">Fleet Server</text>
  <text x="552" y="407" font-size="10" fill="#4338ca">agent management</text>
  <rect x="726" y="381" width="62" height="22" rx="11" fill="#4f46e5"/>
  <text x="757" y="396" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">:8220</text>

  <!-- ===== CLIENT01 (pending) ===== -->
  <rect x="70" y="458" width="240" height="48" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="190" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">CLIENT01 · Windows 11 (eval)</text>
  <text x="190" y="495" text-anchor="middle" font-size="9.5" fill="#94a3b8">domain-joined · pending (Week 3+)</text>

  <!-- ===== Connections ===== -->
  <!-- Browser -> Kibana -->
  <line x1="460" y1="166" x2="518" y2="266" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="452" y="224" text-anchor="end" font-size="10.5" font-weight="600" fill="#2563eb">5601 · HTTP</text>

  <!-- DC01 -> Elasticsearch (data) -->
  <line x1="310" y1="322" x2="518" y2="330" stroke="#0d9488" stroke-width="2" marker-end="url(#aTeal)"/>
  <text x="414" y="314" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">9200 · TLS (data)</text>

  <!-- DC01 -> Fleet (control) -->
  <line x1="310" y1="384" x2="518" y2="392" stroke="#4f46e5" stroke-width="2" marker-end="url(#aIndigo)"/>
  <text x="414" y="378" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4f46e5">8220 · TLS (control)</text>

  <!-- ===== Legend ===== -->
  <line x1="40" y1="536" x2="66" y2="536" stroke="#0d9488" stroke-width="2.5"/>
  <text x="72" y="540" font-size="10.5" fill="#475569">Data plane · :9200 TLS</text>
  <line x1="230" y1="536" x2="256" y2="536" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="262" y="540" font-size="10.5" fill="#475569">Control plane · :8220 TLS</text>
  <line x1="440" y1="536" x2="466" y2="536" stroke="#2563eb" stroke-width="2.5"/>
  <text x="472" y="540" font-size="10.5" fill="#475569">UI · :5601 HTTP</text>
  <line x1="610" y1="536" x2="636" y2="536" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="642" y="540" font-size="10.5" fill="#475569">boundary / pending</text>
</svg>
