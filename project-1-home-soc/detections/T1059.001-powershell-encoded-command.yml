title: PowerShell Encoded Command Execution (alias-aware)
id: bdb30eaf-e1fb-4829-912e-0779fb92e845
status: experimental
description: >
  Detects powershell.exe launched with an encoded-command switch, including the
  abbreviated aliases (-e, -en, -enc, -ec) that evade a literal -EncodedCommand
  match. Also flags PowerShell spawned by WmiPrvSE.exe as a behavioural backstop.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Karthik S
date: 2026/07/19
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1047
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
    Image|endswith: '\powershell.exe'
  selection_enc:
    CommandLine|re: '(?i)\s-e(c|n|nc|ncod|ncode|ncoded|ncodedc|ncodedco|ncodedcom|ncodedcomm|ncodedcomma|ncodedcomman|ncodedcommand)?\s'
  selection_wmi_parent:
    ParentImage|endswith: '\WmiPrvSE.exe'
  condition: selection_img and (selection_enc or selection_wmi_parent)
falsepositives:
  - Legitimate administrative tooling or installers that use -EncodedCommand
  - Management agents that spawn PowerShell via WMI
level: medium
